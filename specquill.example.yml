# specquill server configuration (copy to specquill.yml and adjust)

listen: ":8080"
data_dir: /var/lib/specquill        # bare clones + worktrees (content only)
base_url: https://specquill.example.com

# Postgres store: users, sessions, PR review state, collab logs. The DSN
# carries credentials, so production must pass it via env (works great with
# a serverless Postgres like Neon).
database:
  url_env: SPECQUILL_DATABASE_URL   # e.g. postgres://…neon.tech/specquill?sslmode=require

# projects are writable editing workspaces (a git repo, optionally rooted at a
# content_root subfolder for monorepos)
projects:
  - id: trading-specs
    remote: https://github.com/acme/trading-specs.git
    default_branch: main
    token_env: SPECQUILL_TOKEN_TRADING   # env var holding the push/fetch token; never in this file
    # content_root: docs/specs           # monorepo: workspace lives in a subfolder

# sources are the read-only reference catalog projects may reference and the
# copilot may ground on. Credentials always come from token_env — never inline.
sources:
  # git: a read-only input repo, fetched and never written
  - name: regulations
    kind: git
    remote: https://github.com/acme/regulations.git
    sync_interval: 5m

  # importers mirror non-git sources into read-only repos (materialized locally,
  # refreshed on sync_interval or on demand via POST /api/sources/{name}/sync):
  #
  # url — fetch a list of pages (HTML reduced to text)
  # - name: handbook
  #   kind: url
  #   urls: [https://acme.com/policies/retention, https://acme.com/policies/reporting]
  #
  # openapi — mirror an API contract as a readable index + the raw spec
  # - name: platform-api
  #   kind: openapi
  #   remote: https://api.acme.com/openapi.json
  #
  # confluence — mirror a space's pages (token_env = "email:api_token" for Cloud)
  # - name: wiki
  #   kind: confluence
  #   remote: https://acme.atlassian.net/wiki
  #   space: REG
  #   token_env: SPECQUILL_CONFLUENCE_TOKEN

# grants attach sources to the default (self-host) tenant; omit to grant all
grants: [regulations]

git:
  committer_name: specquill            # service identity — recorded as a Co-authored-by
  committer_email: specquill@example.com   # trailer; the user is author AND committer

auth:
  oidc:
    enabled: true
    issuer: https://login.example.com
    client_id: specquill
    client_secret_env: SPECQUILL_OIDC_SECRET
    scopes: [openid, profile, email]
  local:
    enabled: true                    # fallback login page; add users with `specquill user add`

session:
  ttl: 10m
  cookie_secure: true

# Copilot: any OpenAI-compatible chat-completions endpoint.
ai:
  enabled: true
  # OpenAI:  https://api.openai.com/v1                                model: gpt-4o-mini
  # Gemini:  https://generativelanguage.googleapis.com/v1beta/openai  model: gemini-2.0-flash
  # Ollama:  http://127.0.0.1:11434/v1                                model: llama3.1 (no key)
  base_url: https://api.openai.com/v1
  model: gpt-4o                      # main tier (thinking-class): chat + draft edits
  quick_model: gpt-4o-mini           # fast one-shot tier: commit messages, titles
  api_key_env: SPECQUILL_AI_KEY

