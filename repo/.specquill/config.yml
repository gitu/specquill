# specquill workspace config
version: 2
project: trading-specs
default_branch: main

# view shown when opening the workspace (users can override in Settings)
ui:
  default_view: editor

# id scheme
id_pattern: "REQ-\\d{3}"

# custom document families — product drivers are first-class documents
entities:
  product_driver: { folder: "products/", label: "Products", icon: "◆", color: "#2563c9", description: "Product asks driving requirements — SLAs, PM requests, commitments with an owner and a date." }

# drivers of requirements — regulatory is only one of several
drivers:
  regulatory: { label: "Regulatory", icon: "⚖", color: "#b06f16" }
  product:    { label: "Product",    icon: "◆", color: "#2563c9" }
  technical:  { label: "Technical",  icon: "⚙", color: "#5a616b" }

statuses: [draft, in_review, approved, deprecated]

# typed links used to compute traceability (graph + matrix)
link_types:
  drives:       { from: [regulation, change], to: requirement }
  implements:   { from: requirement,          to: spec }
  maps_to:      { from: spec,                  to: data_field }
  verifies:     { from: test,                  to: requirement }
  traces_from:  { from: any,                   to: any }

paths:
  regulations:  regulations/
  requirements: requirements/
  specs:        specs/
  mappings:     data-mappings/
  diagrams:     diagrams/
  changes:      changes/

# references select granted sources by name (stage 3 of the authorization
# chain); `grounding: true` adds them to the copilot context
references:
  - source: regulations
    grounding: true
