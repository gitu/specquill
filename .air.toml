# Hot-rebuild loop for the Go server (`air` from repo root, or `make dev`).
# Watches server/*.go + specquill.dev.yml; the SPA is NOT rebuilt here —
# in dev the frontend is served by vite on :5173 with HMR (see web/vite.config.ts),
# proxying /api and /auth to this server on :8643.
root = "."
tmp_dir = "server/tmp"

[build]
cmd = "cd server && go build -o tmp/specquill ./cmd/specquill"
bin = "server/tmp/specquill"
args_bin = ["-config", "specquill.dev.yml", "-dev"]
include_dir = ["server"]
include_ext = ["go"]
include_file = ["specquill.dev.yml"]
exclude_dir = ["server/tmp", "server/internal/webui/dist"]
exclude_regex = ["_test\\.go$"]
delay = 300
send_interrupt = true
kill_delay = "2s"
stop_on_error = true

[misc]
clean_on_exit = false
