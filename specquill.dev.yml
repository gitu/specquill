# dev config: local fixture origins (create with `make dev-fixture`), auth relaxed
listen: ":8643"
data_dir: ./data/runtime
base_url: http://localhost:8643

# store: the compose postgres (docker compose -f docker-compose.dev.yml up -d postgres)
database:
  url: postgres://specquill:specquill@127.0.0.1:5433/specquill?sslmode=disable

projects:
  - id: trading-specs
    remote: ./data/origin/trading-specs.git
    default_branch: main
  - id: specquill-docs                      # SpecQuill's own specs — monorepo
    remote: ./data/origin/specquill-docs.git
    content_root: docs/specs                # subfolder project
    default_branch: main

sources:
  - name: regulations
    kind: git
    remote: ./data/origin/regulations.git
    sync_interval: 1m
  # importer demo: an OpenAPI spec the server serves to itself (web/public/),
  # mirrored into a read-only repo so the copilot can ground on the API contract
  - name: platform-api
    kind: openapi
    remote: http://127.0.0.1:8643/demo-openapi.json
    sync_interval: 1h

git:
  committer_name: specquill
  committer_email: specquill@dev.local

auth:
  oidc:
    enabled: false                 # dev: dex via docker-compose.dev.yml exercises OIDC
  local:
    enabled: true
  dev_user:                        # only honored with the -dev flag
    name: Flo Dev
    email: flo@dev.local

session:
  ttl: 10m
  cookie_secure: false             # plain http in dev

# dev copilot: local ollama (swap base_url to :8991 for scripts/mock-llm.py,
# or to a cloud provider — see specquill.example.yml)
ai:
  enabled: true
  base_url: http://127.0.0.1:11434/v1
  model: qwen2.5:7b                  # main tier: chat + draft edits
  quick_model: qwen2.5:7b            # fast one-shot tier: commit messages
