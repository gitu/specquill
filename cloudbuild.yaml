# Deploy-only Cloud Build pipeline (same pattern as pert.li).
#
# The image is built and pushed to ghcr.io by GitHub Actions
# (.github/workflows/docker.yml). This config does NOT rebuild it — it is
# invoked by that workflow via `gcloud builds triggers run <trigger>
# --sha=<commit>` once the image is on ghcr.io, and it:
#   1. pulls THIS commit's image through an Artifact Registry remote-repo
#      proxy of ghcr.io (no Google-side build),
#   2. applies the production promotion gate (_VERSION_GATE),
#   3. rolls the image out to Cloud Run.
#
# The same file drives two MANUAL-INVOCATION triggers that differ only by
# substitutions:
#
#   "deploy staging" (run by GH on main)    "deploy prod" (run by GH on tag v*)
#   ────────────────────────────────────    ───────────────────────────────────
#   _SERVICE: reqbase-staging               _SERVICE: reqbase
#   _VERSION_GATE: "off"                    _VERSION_GATE: "on"
#   (+ per-env secret-name overrides)
#
# Promotion model:
#   • Staging tracks main head-on: every push deploys `reqbase-staging`.
#   • Production only advances to a newer version that shipped through main:
#     the version-gate deploys only when the tagged commit is an ancestor of
#     origin/main AND the tag is the newest v* reachable from main. Release:
#     merge to main, then `git tag vX.Y.Z <main-commit> && git push origin vX.Y.Z`.
#
# reqbase specifics:
#   • The runtime config is baked into the image (deploy/reqbase.cloud.yml);
#     the only deploy-time inputs are the secrets mounted as env vars below.
#   • max-instances=1 is a HARD requirement: SQLite (sessions, PRs, collab
#     room logs) and the in-process collab hub live in one instance.
#   • --no-cpu-throttling + long timeout keep collab websockets alive.
#
# Substitution variables:
#   _REGION              deploy region + AR location
#   _SERVICE             Cloud Run service name (per-env)
#   _REMOTE_REPO         AR remote repository proxying https://ghcr.io
#   _GHCR_IMAGE          lowercase ghcr path: <owner>/<repo>
#   _TOKEN_SECRET        Secret Manager entry: git push/fetch token
#   _OIDC_SECRET_NAME    Secret Manager entry: OIDC client secret
#   _AI_KEY_SECRET       Secret Manager entry: copilot API key
#   _DATABASE_URL_SECRET Secret Manager entry: Postgres DSN (Neon)
#   _MIN_INSTANCES       0 = scale to zero (staging); 1 keeps state warm (prod)
#   _VERSION_GATE        "on" (prod tag trigger) | "off" (staging). Default off.

substitutions:
  _REGION: europe-west1
  _SERVICE: reqbase
  _REMOTE_REPO: ghcr-remote
  _GHCR_IMAGE: gitu/reqbase
  _TOKEN_SECRET: REQBASE_TOKEN
  _OIDC_SECRET_NAME: REQBASE_OIDC_SECRET
  _AI_KEY_SECRET: REQBASE_AI_KEY
  _DATABASE_URL_SECRET: REQBASE_DATABASE_URL
  _MIN_INSTANCES: "1"
  _VERSION_GATE: "off"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Resolve the human-readable version (e.g. `v0.3.2`, or `v0.3.2-4-gabc1234`
  # between tags) — recorded on the service and used by the version-gate.
  - id: compute-version
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    waitFor: ["-"]
    args:
      - -c
      - |
        set -euo pipefail
        git fetch --tags --depth=100 2>/dev/null || true
        git describe --tags --always --dirty > /workspace/APP_VERSION
        printf 'APP_VERSION=%s\n' "$(cat /workspace/APP_VERSION)"

  # Promotion gate: writes yes/no to /workspace/DEPLOY_GO. Only gates when
  # _VERSION_GATE=on (prod): the commit must be on main AND the version must
  # be the newest v* tag reachable from main — prod never rolls backwards.
  # A genuine "not on main / not newest" is a clean skip; an inability to
  # ESTABLISH the facts fails the build loudly so a release isn't dropped.
  - id: version-gate
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    waitFor: ["compute-version"]
    args:
      - -c
      - |
        set -euo pipefail
        if [ "${_VERSION_GATE}" != "on" ]; then
          echo "version gate off — deploy allowed"
          echo yes > /workspace/DEPLOY_GO
          exit 0
        fi

        fail_unverifiable() {
          echo "GATE: cannot verify prod promotion — $$1" >&2
          exit 1
        }

        git fetch --unshallow 2>/dev/null || git fetch 2>/dev/null || true
        git fetch origin '+refs/heads/main:refs/remotes/origin/main' 2>/dev/null \
          || fail_unverifiable "git fetch origin main failed"
        git rev-parse --verify -q origin/main >/dev/null \
          || fail_unverifiable "origin/main could not be resolved after fetch"
        git fetch --tags 2>/dev/null || fail_unverifiable "git fetch --tags failed"

        NEW="$(cat /workspace/APP_VERSION)"

        set +e
        git merge-base --is-ancestor HEAD origin/main
        rc=$$?
        set -e
        if [ "$$rc" -gt 1 ]; then
          fail_unverifiable "git merge-base errored (rc=$$rc)"
        fi
        if [ "$$rc" -ne 0 ]; then
          echo "GATE: commit $(git rev-parse --short HEAD) is not on main — skipping prod rollout"
          echo no > /workspace/DEPLOY_GO
          exit 0
        fi

        HIGHEST="$(git tag --merged origin/main --list 'v*' | sort -V | tail -1)"
        if [ -z "$$HIGHEST" ]; then
          fail_unverifiable "no v* tags resolved on main (tag fetch incomplete?)"
        fi
        if [ "$$NEW" != "$$HIGHEST" ]; then
          echo "GATE: version $$NEW is not the newest on main (newest is $$HIGHEST) — skipping prod rollout"
          echo no > /workspace/DEPLOY_GO
          exit 0
        fi

        echo "GATE: $$NEW is on main and the newest version — prod rollout allowed"
        echo yes > /workspace/DEPLOY_GO

  # Deploy from the proxied image — a gated prod build that didn't win the
  # gate is a clean no-op. On a gated release the version-tagged image is
  # rolled out (human-readable revision); staging keeps the immutable SHA.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["version-gate", "compute-version"]
    args:
      - -c
      - |
        set -euo pipefail
        if [ "$(cat /workspace/DEPLOY_GO 2>/dev/null || echo no)" != "yes" ]; then
          echo "deploy skipped — version gate did not approve this build for ${_SERVICE}"
          exit 0
        fi
        APP_VERSION="$(cat /workspace/APP_VERSION)"
        if [ "${_VERSION_GATE}" = "on" ]; then
          IMAGE_REF="$$APP_VERSION"
        else
          IMAGE_REF="${COMMIT_SHA}"
        fi
        echo "Deploying ${_SERVICE} from image tag :$$IMAGE_REF"
        gcloud run deploy ${_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REMOTE_REPO}/${_GHCR_IMAGE}:$$IMAGE_REF \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --min-instances=${_MIN_INSTANCES} \
          --max-instances=1 \
          --concurrency=80 \
          --cpu=1 \
          --memory=512Mi \
          --timeout=3600 \
          --no-cpu-throttling \
          --set-env-vars="APP_VERSION=$$APP_VERSION" \
          --set-secrets=REQBASE_TOKEN=${_TOKEN_SECRET}:latest,REQBASE_OIDC_SECRET=${_OIDC_SECRET_NAME}:latest,REQBASE_AI_KEY=${_AI_KEY_SECRET}:latest,REQBASE_DATABASE_URL=${_DATABASE_URL_SECRET}:latest
