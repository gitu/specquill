# dex dev IdP config (see docker-compose.dev.yml)
issuer: http://127.0.0.1:5556/dex
storage:
  type: memory
web:
  http: 0.0.0.0:5556
oauth2:
  skipApprovalScreen: true
staticClients:
  - id: reqbase
    redirectURIs:
      - http://localhost:8643/auth/callback
      - http://localhost:8644/auth/callback
    name: reqbase dev
    secret: dev-secret
enablePasswordDB: true
staticPasswords:
