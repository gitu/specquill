# Dev dependencies:
#   docker compose -f docker-compose.dev.yml up -d
#
# postgres — the specquill store (users, sessions, PRs, collab logs); matches
#   the `database.url` in specquill.dev.yml. Port 5433 to avoid a host postgres.
# dex — IdP for exercising the OIDC flow locally: point specquill.dev.yml at
#   issuer http://127.0.0.1:5556/dex with client_id specquill / secret in
#   SPECQUILL_OIDC_SECRET=dev-secret and log in as admin@example.com / password.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: specquill
      POSTGRES_PASSWORD: specquill
      POSTGRES_DB: specquill
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specquill -d specquill"]
      interval: 2s
      timeout: 3s
      retries: 15

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yml"]
    ports:
      - "5556:5556"
    volumes:
      - ./scripts/dex-config.yml:/etc/dex/config.yml:ro

volumes:
  pg-data:
